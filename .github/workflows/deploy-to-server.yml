# this will deploy the safe / secure / tested app to prod server EC2
name: Deploy to Server

on:
  workflow_call:

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH to prod server and create folder
        uses: appleboy/ssh-action@v1.0.3 # Use the marketplace action
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Installing required packages and folders"
            sudo apt-get update
            sudo apt-get install docker.io docker-compose-v2 -y
            sudo systemctl restart docker
            sudo usermode -aG $USER && newgrp docker
            mkdir -p devops

      - name: Copy the docker compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~devops/

      - name: SSH to prod server and running app
        uses: appleboy/ssh-action@v1.0.3 # Use the marketplace action
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

          script: |
            echo "Running App"
            export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
            export DOCKER_TAG=${{ github.sha }}
            echo ${{secrets.DOCKERHUB_TOKEN}} | docker login -u ${{vars.DOCKERHUB_USER}} --password-stdin
            cd ~devops && docker compose down && docker compose up -d --build --force-recreate --pull always
