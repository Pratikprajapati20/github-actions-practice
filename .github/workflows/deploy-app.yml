name: deploy-flask-app

on:
  workflow_dispatch:

jobs:
  deploye:
    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
    runs-on: [self-hosted, Linux]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: deploy with docker compose
        run: docker compose down && docker compose up -d --build --force-recreate
