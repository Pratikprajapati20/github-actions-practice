name: docker-build-push

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{vars.DOCKERHUB_USER}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: build and push
        uses: docker/build-push-actions@v6
        with:
          context: .
          push: true
          tags: |
            ${{varS.DOCKERHUB_USER}}/${{github.repository}}:${{guthub:ref}}
            ${{varS.DOCKERHUB_USER}}/${{github.repository}}:latest
            ${{vars.DOCKERHUB_USER}}/${{github.repository}}:${{github.sha]}}
